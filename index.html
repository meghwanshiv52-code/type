<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Court Typing - 450 Exercises Master</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="dashboardScreen" class="window-container">
    <div class="window-header">
        <span>Rajasthan High Court / SSC Exam - 450 Master List</span>
    </div>
    <div class="list-container" id="exerciseList">
        </div>
</div>

<div id="testScreen" class="exam-window" style="display: none;">
    <div class="top-bar">
        <button class="header-btn" onclick="goBack()">🔙 Back to List</button>
        <span class="header-title" id="testTitle">Exercise Name</span>
        <select id="timeSelect" class="select-box">
            <option value="600">10 Minutes</option>
            <option value="300">5 Minutes</option>
            <option value="60">1 Minute</option>
        </select>
    </div>

    <div class="text-display" id="textContainer"></div>
    
    <textarea id="typingInput" class="type-area" placeholder="Start typing here..."></textarea>
    
    <div class="bottom-stats">
        <span>Time: <strong id="timerVal" style="color: #d32f2f;">10:00</strong></span>
        <span>Gross: <strong id="wpmVal">0 WPM</strong></span>
        <span>Net: <strong id="netWpmVal">0 WPM</strong></span>
        <span>Accuracy: <strong id="accuracyVal">100%</strong></span>
        <button onclick="resetEngine()" style="padding: 5px 15px; cursor: pointer; background: #e0e0e0; border: 1px solid #999;">🔄 Restart Test</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
